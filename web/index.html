<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS</title>
    <link rel="stylesheet" href="global.css">
</head>
<body>
    <nav class="navbar">
        <img src="./asset/logo.png">
    </nav>

    <main style="padding: 20px;">
        <div class="win-panel" style="max-width: 800px; margin: 0 auto;">
            <div style="background: var(--primary-color); padding: 2px 5px; border-bottom: 1px solid #000; font-weight: bold;">
                LMS
            </div>
            <div class="win-inset" style="padding: 20px; min-height: 200px;">
                <p>Welcome to Lime's Media Server</p>
                <p>Select a category below to begin browsing your library.</p>
                <div class="icon-container" style="margin-top: 20px;">
                    <a href="movies.html" class="desktop-icon">
                        <img src="./asset/movies_icon.png" alt="Movies">
                        <span>Movies</span>
                    </a>
                    <a href="music.html" class="desktop-icon">
                        <img src="./asset/music_icon.png" alt="Music">
                        <span>Music</span>
                    </a>
                    <a href="shows.html" class="desktop-icon">
                        <img src="./asset/shows_icon.png" alt="Shows">
                        <span>Shows</span>
                    </a>
                </div>
            </div>
            <div></div>
        </div>
    </main>

    <script src="movies.js"></script>
    <script src="music.js"></script>
</body>
</html>
