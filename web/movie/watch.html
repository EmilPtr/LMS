<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS - Watch Movie</title>
    <link rel="stylesheet" href="../global.css">
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        .player-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }
        /* Style the Video.js container with LMS design language */
        .video-js.playback-video-container {
            width: 100%;
            max-height: 70vh;
            border: var(--inner-border);
            background-color: #000;
        }
        .error-container {
            padding: 40px;
            text-align: center;
        }
        .error-title {
            color: #ff0000;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="../index.html"><img src="../asset/logo.png" alt="LMS Logo"></a>
    </nav>

    <main style="padding: 40px; max-width: 1200px; margin: 0 auto;">
        <div class="win-panel" id="watch-panel">
            <div style="background: var(--primary-color); padding: 5px 10px; border-bottom: 1px solid #000; font-weight: bold; display: flex; justify-content: space-between; align-items: center;">
                <span id="movie-title-header">Loading Movie Player...</span>
                <button class="win-btn" onclick="window.location.href='movies.html'">Back to Catalog</button>
            </div>
            <div class="win-inset" style="padding: 20px;">
                <div id="player-view" class="player-container" style="display: none;">
                    <!-- Wrapper container for Video.js responsive setup -->
                    <div style="width: 100%;">
                        <video id="video-player" class="video-js vjs-default-skin playback-video-container" controls preload="auto">
                            Your browser does not support Video.js.
                        </video>
                    </div>
                    <div id="movie-title" style="font-size: 1.3rem; font-weight: bold; margin-top: 15px; width: 100%; text-align: left;"></div>
                    <div id="movie-duration" style="font-size: 1rem; color: #444; width: 100%; text-align: left; margin-top: 5px;"></div>
                </div>
                <div id="error-view" class="error-container" style="display: none;">
                    <div class="error-title">Error: Movie Not Found</div>
                    <p id="error-message">The specified movie ID does not exist in the catalog.</p>
                </div>
            </div>
        </div>
    </main>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="../player-common.js"></script>
    <script src="watch.js"></script>
</body>
</html>
