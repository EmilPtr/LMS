<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS - Watch Movie</title>
    <link rel="stylesheet" href="global.css">
    <style>
        .player-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }
        video.playback-video {
            width: 100%;
            max-height: 70vh;
            border: var(--inner-border);
            background-color: #000;
        }
        .error-container {
            padding: 40px;
            text-align: center;
        }
        .error-title {
            color: #ff0000;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html"><img src="./asset/logo.png" alt="LMS Logo"></a>
    </nav>

    <main style="padding: 40px; max-width: 1200px; margin: 0 auto;">
        <div class="win-panel" id="watch-panel">
            <div style="background: var(--primary-color); padding: 5px 10px; border-bottom: 1px solid #000; font-weight: bold; display: flex; justify-content: space-between; align-items: center;">
                <span id="movie-title-header">Loading Movie Player...</span>
                <button class="win-btn" onclick="window.location.href='movies.html'">Back to Catalog</button>
            </div>
            <div class="win-inset" style="padding: 20px;">
                <div id="player-view" class="player-container" style="display: none;">
                    <video id="video-player" class="playback-video" controls autoplay>
                        Your browser does not support the video tag.
                    </video>
                    <div id="movie-title" style="font-size: 1.3rem; font-weight: bold; margin-top: 15px; width: 100%; text-align: left;"></div>
                    <div id="movie-duration" style="font-size: 1rem; color: #444; width: 100%; text-align: left; margin-top: 5px;"></div>
                </div>
                <div id="error-view" class="error-container" style="display: none;">
                    <div class="error-title">Error: Movie Not Found</div>
                    <p id="error-message">The specified movie ID does not exist in the catalog.</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        function formatDuration(seconds) {
            if (!seconds) return 'Unknown';
            const hrs = Math.floor(seconds / 3600);
            const mins = Math.floor((seconds % 3600) / 60);
            if (hrs > 0) return `${hrs}h ${mins}m`;
            return `${mins}m`;
        }

        async function initPlayer() {
            const urlParams = new URLSearchParams(window.location.search);
            const movieId = urlParams.get('id');

            if (!movieId) {
                showError("No movie ID specified in the URL.");
                return;
            }

            try {
                const response = await fetch('../manifest.json');
                const manifest = await response.json();
                
                if (!manifest || !manifest.movies) {
                    showError("Manifest is empty or corrupted.");
                    return;
                }

                const movie = manifest.movies.find(m => m.id === movieId);

                if (!movie) {
                    showError(`Movie with ID '${movieId}' was not found in the manifest.`);
                    return;
                }

                // Setup the player
                document.getElementById('movie-title-header').textContent = `Playing: ${movie.name}`;
                document.getElementById('movie-title').textContent = movie.name;
                document.getElementById('movie-duration').textContent = `Duration: ${formatDuration(movie.length)}`;
                
                const player = document.getElementById('video-player');
                player.src = movie.location;
                if (movie.thumbnail) {
                    player.poster = movie.thumbnail;
                }

                document.getElementById('player-view').style.display = 'flex';
            } catch (err) {
                console.error("Error loading movie:", err);
                showError("Failed to fetch or parse the manifest.json file.");
            }
        }

        function showError(msg) {
            document.getElementById('movie-title-header').textContent = "Error";
            document.getElementById('error-message').textContent = msg;
            document.getElementById('error-view').style.display = 'block';
        }

        document.addEventListener('DOMContentLoaded', initPlayer);
    </script>
</body>
</html>
