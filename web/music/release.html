<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS - Release</title>
    <link rel="stylesheet" href="../global.css">
    <style>
        .release-container {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
        }
        .release-info-panel {
            flex: 1 1 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .release-tracks-panel {
            flex: 2 2 500px;
            height: fit-content;
            align-self: flex-start;
        }
        .release-cover {
            width: 100%;
            max-width: 250px;
            height: auto;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border: var(--inner-border);
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }
        .track-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .track-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border: 1px solid transparent;
            cursor: pointer;
            font-size: 0.95rem;
        }
        .track-item:hover {
            background-color: rgba(0, 0, 128, 0.05);
            border: 1px dotted #888;
        }
        .track-item.active {
            background-color: var(--primary-color);
            color: #000;
            font-weight: bold;
            border: 1px solid #000;
        }
        .audio-player-container {
            margin-top: 30px;
            width: 100%;
        }
        audio {
            width: 100%;
            outline: none;
        }
        @media (max-width: 768px) {
            .release-container {
                flex-direction: column;
                gap: 20px;
            }
            .release-info-panel, .release-tracks-panel {
                flex: 1 1 auto;
                width: 100%;
            }
            .release-cover {
                max-width: 200px;
            }
            /* Stack or optimize button sizing if needed */
            #mode-btn {
                min-width: unset !important;
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="../index.html"><img src="../asset/logo.png" alt="LMS Logo"></a>
    </nav>

    <main style="padding: 40px; max-width: 1200px; margin: 0 auto;">
        <div class="win-panel" id="release-panel">
            <div style="background: var(--primary-color); padding: 5px 10px; border-bottom: 1px solid #000; font-weight: bold; display: flex; justify-content: space-between; align-items: center;">
                <span id="release-header-title">Loading Release...</span>
                <button class="win-btn" onclick="window.location.href='music.html'">Back to Catalog</button>
            </div>
            <div class="win-inset" style="padding: 40px;">
                <div id="release-content" class="release-container" style="display: none;">
                    
                    <!-- Left: Release Info and Audio Player -->
                    <div class="release-info-panel">
                        <img id="album-cover" class="release-cover" src="" alt="Album Cover">
                        <h2 id="album-title" style="margin: 0 0 10px 0; font-size: 1.5rem; text-align: center;"></h2>
                        <div id="track-count" style="font-size: 1rem; color: #444; margin-bottom: 20px;"></div>
                        
                        <!-- Persistent Player Controls -->
                        <div class="win-panel audio-player-container">
                            <div style="background: #808080; color: #fff; padding: 3px 10px; font-size: 0.85rem; font-weight: bold; display: flex; justify-content: space-between;">
                                <span>Now Playing</span>
                                <span id="player-mode-status">Mode: Repeat All</span>
                            </div>
                            <div style="padding: 15px; background: #c0c0c0; display: flex; flex-direction: column; gap: 15px; align-items: center;">
                                <div id="now-playing-title" style="font-size: 0.95rem; font-weight: bold; width: 100%; text-align: center; text-overflow: ellipsis; overflow: hidden; white-space: nowrap;">No track selected</div>
                                <audio id="audio-player" controls></audio>
                                <div style="display: flex; gap: 10px; width: 100%; justify-content: center;">
                                    <button class="win-btn" id="prev-btn">◀ Previous</button>
                                    <button class="win-btn" id="next-btn">Next ▶</button>
                                    <button class="win-btn" id="mode-btn" style="min-width: 130px;">Mode: Repeat All</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Right: Tracks list -->
                    <div class="release-tracks-panel">
                        <div class="win-panel">
                            <div style="background: #808080; color: #fff; padding: 5px 10px; font-weight: bold; font-size: 0.9rem;">
                                Tracks
                            </div>
                            <div class="win-inset" style="background: #fff; max-height: 500px; overflow-y: auto; padding: 5px;">
                                <ul id="track-list" class="track-list">
                                    <!-- Tracks injected here -->
                                </ul>
                            </div>
                        </div>
                    </div>

                </div>

                <div id="error-view" style="display: none; text-align: center; padding: 40px;">
                    <h2 style="color: red; font-weight: bold;">Error: Release Not Found</h2>
                    <p id="error-message">The requested release could not be located.</p>
                </div>
            </div>
        </div>
    </main>

    <script src="release.js"></script>
</body>
</html>
